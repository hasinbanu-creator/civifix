# GitHub Actions CI/CD Pipeline Configuration for CiviFix E2E Testing
name: CiviFix CI/CD Workflow

# Trigger workflow automatically on every push and pull request to the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-e2e-tests:
    name: Install, Build, and Run Selenium E2E Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out repository code
      - name: Check out Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get full history

      # Step 2: Set up Python runtime environment
      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Enable automatic caching for Python dependencies

      # Step 3: Install Python dependencies for Selenium runner and openpyxl/pandas
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pandas openpyxl webdriver-manager

      # Step 4: Set up Node.js runtime environment for Next.js
      - name: Set up Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Enable automatic caching for npm packages
          cache-dependency-path: './civifix-web/package-lock.json'

      # Step 5: Install Next.js frontend dependencies
      - name: Install Frontend Dependencies
        working-directory: ./civifix-web
        run: npm ci

      # Step 6: Start Next.js development server in mock E2E mode in the background
      - name: Start Frontend Dev Server (Mock Mode)
        working-directory: ./civifix-web
        env:
          NEXT_PUBLIC_E2E_MOCKS: 'true'
          NEXT_PUBLIC_API_URL: 'http://localhost:8000/api/v1'
        run: npm run dev &

      # Step 7: Wait for Next.js frontend dev server to be ready
      - name: Wait for Frontend Server (HTTP Port 3000)
        run: |
          echo "Waiting for Next.js to start on http://localhost:3000..."
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200"; then
              echo "Server is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "Error: Server timeout on port 3000"
          exit 1

      # Step 8: Execute Selenium E2E tests and generate Excel report at root test_results/
      - name: Run E2E Selenium Tests
        env:
          CIVIFIX_BASE_URL: 'http://localhost:3000'
        run: |
          python civifix-web/e2e_tests/run_selenium_report.py

      # Step 9: Verify the Excel report exists, print its absolute path, and fail if missing
      - name: Verify and Log Report File
        run: |
          REPORT_PATH="test_results/selenium_test_report.xlsx"
          if [ -f "$REPORT_PATH" ]; then
            echo "Verification Successful: Excel report was generated successfully."
            echo "Absolute Path of Report: $(realpath "$REPORT_PATH")"
          else
            echo "Verification Failed: Excel report was NOT generated!"
            exit 1
          fi

      # Step 10: Run Security validation checks and generate Vulnerability Report
      - name: Generate Vulnerability Validation Report
        run: |
          python generate_security_report.py

      # Step 11: Verify the Vulnerability report exists, print its absolute path, and fail if missing
      - name: Verify and Log Vulnerability Report File
        run: |
          VULN_PATH="Vulnerability Test Results/vulnerability_report.xlsx"
          if [ -f "$VULN_PATH" ]; then
            echo "Verification Successful: Vulnerability report was generated successfully."
            echo "Absolute Path of Vulnerability Report: $(realpath "$VULN_PATH")"
          else
            echo "Verification Failed: Vulnerability report was NOT generated!"
            exit 1
          fi

      # Step 12: Upload the E2E report as a GitHub Actions Artifact (exact requested name/path/action)
      - name: Upload Selenium Report
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: test_results/selenium_test_report.xlsx

      # Step 13: Upload the Vulnerability Report as a GitHub Actions Artifact
      - name: Upload Vulnerability Report
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: Vulnerability Test Results/vulnerability_report.xlsx
